<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var path = window.location.pathname;
      var query = window.location.search;
      var hash = window.location.hash;
      var redirectUrl = '/armaan-portfolio/?redirect=' + encodeURIComponent(path + query + hash);
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
